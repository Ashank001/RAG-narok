version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: hub-redis
    ports:
      - "6379:6379"
    networks:
      - hub-network

  api-gateway:
    image: node:18-alpine
    container_name: hub-api-gateway
    working_dir: /app
    volumes:
      - ./api-gateway:/app
    ports:
      - "3000:3000"
    command: sh -c "echo 'API Gateway placeholder starting...' && tail -f /dev/null"
    networks:
      - hub-network

  rag-engine:
    image: python:3.10-slim
    container_name: hub-rag-engine
    working_dir: /app
    volumes:
      - ./rag-engine:/app
    ports:
      - "8000:8000"
    command: sh -c "echo 'RAG Engine placeholder starting...' && tail -f /dev/null"
    networks:
      - hub-network

  frontend:
    image: node:18-alpine
    container_name: hub-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3001:3001"
    command: sh -c "echo 'Frontend placeholder starting...' && tail -f /dev/null"
    networks:
      - hub-network

networks:
  hub-network:
    driver: bridge
